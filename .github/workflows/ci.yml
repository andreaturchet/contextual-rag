# CI/CD Pipeline for Secure-LLMOps Pipeline
# ==========================================
# This workflow runs on every push and pull request.
# It runs tests and checks code quality.

name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Run Tests
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Check out the code
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      # Step 4: Run tests
      - name: Run tests
        run: |
          pytest tests/ -v --cov=src --cov-report=xml
      
      # Step 5: Upload coverage (optional)
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
  
  # Job 2: Code Quality Checks
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install linters
        run: |
          pip install flake8 black
      
      - name: Check code formatting (Black)
        run: |
          black --check src/ tests/ --line-length 100
        continue-on-error: true  # Don't fail on formatting issues
      
      - name: Check code style (Flake8)
        run: |
          flake8 src/ tests/ --max-line-length=100 --ignore=E501,W503
        continue-on-error: true  # Don't fail on style issues

  # Job 3: Build Docker Image (on main branch only)
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test]  # Only run after tests pass
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build Docker image
        run: |
          docker build -t secure-llmops-pipeline:latest -f deployment/Dockerfile .
      
      - name: Test Docker image
        run: |
          docker run --rm secure-llmops-pipeline:latest python -c "import src; print('Import OK')"
